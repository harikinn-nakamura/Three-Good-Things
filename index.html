<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      height: 100vh;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(120deg, #2193b0 0%, #6dd5ed 100%);
      font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'メイリオ', sans-serif;
    }
    .container {
      background: #fff;
      border-radius: 2rem;
      box-shadow: 0 6px 30px rgba(33, 147, 176, 0.18), 0 2px 4px rgba(0,0,0,0.06);
      padding: 2.5rem 2.2rem 2rem 2.2rem;
      width: 100%;
      max-width: 430px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: #2193b0;
      margin-bottom: 0.2em;
      letter-spacing: 0.05em;
    }
    p {
      color: #444;
      margin-bottom: 1.6em;
      text-align: center;
    }
    label {
      color: #2193b0;
      font-weight: 600;
      margin-bottom: 0.4em;
      display: block;
      letter-spacing: 0.03em;
      text-align: left;
    }
    .input-area {
      margin-bottom: 1.2em;
      width: 100%;
      max-width: 330px;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    
    /* ★変更点：input[type="email"]にもスタイルを適用 */
    input[type="email"],
    textarea {
      width: 100%;
      font-size: 1.05em;
      padding: 0.7em 1em;
      border: 1.5px solid #6dd5ed;
      border-radius: 0.9em;
      outline: none;
      transition: border 0.2s;
      background: #f6fbff;
      box-sizing: border-box;
    }
    textarea {
      min-height: 2.8em;
      resize: vertical;
    }
    input[type="email"].input-required,
    textarea.input-required {
      border: 1.5px solid #e06464;
    }
    
    .error-message, .success-message {
      border-radius: 0.6em;
      padding: 0.7em 1em;
      margin-bottom: 1.1em;
      font-size: 0.97em;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      display: none;
    }
    .error-message {
      color: #e06464;
      background: #fff4f4;
    }
    .success-message {
      color: #2193b0;
      background: #f3fcff;
    }
    #submitBtn {
      background: #fff;
      color: #2193b0;
      border: 2px solid #2193b0;
      border-radius: 1.2em;
      padding: 0.9em 0;
      font-size: 1.1em;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(33,147,176,0.07);
      transition: background 0.2s, color 0.2s, border 0.2s;
      margin-top: 0.5em;
      margin-bottom: 0.2em;
      max-width: 330px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    #submitBtn:hover {
      background: #2193b0;
      color: #fff;
      border: 2px solid #6dd5ed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>スリーグッドシングス</h1>
    <p>今日あった３つの良いことを教えてください。</p>

    <div id="error-area" class="error-message"></div>
    <div id="success-area" class="success-message"></div>

    <div class="input-area">
      <label for="email">メールアドレス (必須):</label>
      <input type="email" id="email" name="email" required placeholder="example@gmail.com">
    </div>

    <div class="input-area">
      <label for="goodThing1">良いこと１ (必須):</label>
      <textarea id="goodThing1" name="goodThing1" required></textarea>
    </div>
    <div class="input-area">
      <label for="goodThing2">良いこと２ (必須):</label>
      <textarea id="goodThing2" name="goodThing2" required></textarea>
    </div>
    <div class="input-area">
      <label for="goodThing3">良いこと３ (必須):</label>
      <textarea id="goodThing3" name="goodThing3" required></textarea>
    </div>
    <button id="submitBtn">送信</button>
  </div>

  <script>
    const errorArea = document.getElementById('error-area');
    const successArea = document.getElementById('success-area');
    const submitBtn = document.getElementById('submitBtn');
    
    // ★変更点：メールアドレス要素を取得
    const emailInput = document.getElementById('email');
    const goodThing1Input = document.getElementById('goodThing1');
    const goodThing2Input = document.getElementById('goodThing2');
    const goodThing3Input = document.getElementById('goodThing3');
    
    // ★変更点：チェック対象に emailInput を追加
    const inputs = [emailInput, goodThing1Input, goodThing2Input, goodThing3Input];

    // ★ 新しいデプロイで発行されたURLをここに貼り付けてください
    const GAS_URL = 'https://script.google.com/a/macros/harita.co.jp/s/AKfycbxVYAr4Gg0GsxWBLWfGQhWkxc_1-EgC2lzxvq0fHAaP5qZEnJXFf7-h4-i4WQaJfXekbQ/exec';

    submitBtn.addEventListener('click', function() {
      errorArea.style.display = 'none';
      successArea.style.display = 'none';
      inputs.forEach(input => input.classList.remove('input-required'));

      // 簡単なメールアドレス形式チェック
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (emailInput.value.trim() !== '' && !emailRegex.test(emailInput.value)) {
        errorArea.textContent = '有効なメールアドレスを入力してください。';
        errorArea.style.display = 'block';
        emailInput.classList.add('input-required');
        return;
      }

      const formData = {
        email: emailInput.value, // ★追加
        goodThing1: goodThing1Input.value,
        goodThing2: goodThing2Input.value,
        goodThing3: goodThing3Input.value
      };

      let hasError = false;
      inputs.forEach(input => {
        if (!input.value.trim()) {
          input.classList.add('input-required');
          hasError = true;
        }
      });

      if (hasError) {
        errorArea.textContent = '未入力の項目があります。';
        errorArea.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      fetch(GAS_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain',
        },
        body: JSON.stringify(formData)
      })
      .then(response => response.json())
      .then(data => {
        submitBtn.disabled = false;
        submitBtn.textContent = '送信';

        if (data.success) {
          successArea.textContent = data.message;
          successArea.style.display = 'block';
          inputs.forEach(input => input.value = ''); 
        } else {
          errorArea.textContent = data.message;
          errorArea.style.display = 'block';
        }
      })
      .catch(error => {
        submitBtn.disabled = false;
        submitBtn.textContent = '送信';
        errorArea.textContent = '通信エラーが発生しました。ネットワークを確認してください。';
        errorArea.style.display = 'block';
        console.error('Error:', error);
      });
    });
  </script>
</body>
</html>
